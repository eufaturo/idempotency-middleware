name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release_drafter:
    name: Release Drafter
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Wait for PR merge to propagate
        run: sleep 10

      - uses: release-drafter/release-drafter@v7
        with:
          commitish: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
